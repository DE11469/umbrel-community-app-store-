version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: fixedcoin_server_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"

  server:
    image: nginx:alpine
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command: ["sh", "-c", "echo '<html><body><h1>FixedCoin Node</h1><p>Running!</p></body></html>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
