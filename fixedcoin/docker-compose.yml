version: "3.7"

services:

  app_proxy:
    environment:
      APP_HOST: fixedcoin_server_1
      APP_PORT: 80
      PROXY_AUTH_ADD: "false"
      STRIP_PREFIX: "/fixedcoin"

  server:
    image: nginx:alpine
    init: true
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}/www:/usr/share/nginx/html:ro
